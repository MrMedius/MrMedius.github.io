<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title data-i18n-title>项目详情</title>
<style>
  :root {
    --bg: #0b0e14;
    --panel: #12161f;
    --panel-line: #1f2530;
    --text: #e4e7ec;
    --text-dim: #7c8494;
    --accent: #ff9d4d;
    --data: #5eead4;
    --mono: 'JetBrains Mono', 'Consolas', monospace;
    --sans: 'Inter', -apple-system, 'PingFang SC', 'Microsoft YaHei', 'Hiragino Sans', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    line-height: 1.7;
  }

  a { color: inherit; text-decoration: none; }
  ::selection { background: var(--accent); color: #0b0e14; }

  header {
    position: sticky;
    top: 0; z-index: 100;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 22px 5vw;
    background: rgba(11,14,20,0.9);
    backdrop-filter: blur(6px);
    border-bottom: 1px solid var(--panel-line);
  }

  .back-link {
    font-family: var(--mono);
    font-size: 13px;
    color: var(--text-dim);
    display: flex;
    align-items: center;
    gap: 8px;
    transition: color .2s;
  }
  .back-link:hover { color: var(--accent); }

  .lang-switch { display: flex; gap: 4px; font-family: var(--mono); font-size: 12px; }
  .lang-switch button {
    background: transparent;
    border: 1px solid var(--panel-line);
    color: var(--text-dim);
    width: 68px;
    padding: 6px 0;
    border-radius: 3px;
    cursor: pointer;
    transition: all .2s;
    text-align: center;
  }
  .lang-switch button:hover { color: var(--text); border-color: var(--text-dim); }
  .lang-switch button.active { color: var(--accent); border-color: var(--accent); }

  main { max-width: 960px; margin: 0 auto; padding: 60px 5vw 120px; }

  .build-tag {
    font-family: var(--mono);
    font-size: 13px;
    color: var(--accent);
    letter-spacing: 1px;
    margin-bottom: 18px;
  }
  .build-tag small { color: var(--text-dim); margin-left: 10px; }

  h1 {
    font-family: var(--mono);
    font-size: clamp(28px, 5vw, 44px);
    line-height: 1.2;
    margin-bottom: 18px;
  }

  .lede {
    color: var(--text-dim);
    font-size: 17px;
    max-width: 68ch;
    margin-bottom: 30px;
  }

  .stack { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 50px; }
  .stack span {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--data);
    border: 1px solid rgba(94,234,212,0.3);
    padding: 4px 10px;
    border-radius: 3px;
  }

  /* ---------- Gallery (Steam 式媒体展示) ---------- */
  .gallery { margin-bottom: 20px; }

  .gallery-main {
    position: relative;
    width: 100%;
    aspect-ratio: 16 / 9;
    background: var(--panel);
    border: 1px solid var(--panel-line);
    border-radius: 4px;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .gallery-main video,
  .gallery-main img {
    max-width: 100%;
    max-height: 100%;
    width: auto;
    height: auto;
    object-fit: contain;
    display: block;
  }

  .gallery-thumbs {
    display: flex;
    gap: 10px;
    margin-top: 12px;
    overflow-x: auto;
    padding-bottom: 6px;
  }
  .gallery-thumbs::-webkit-scrollbar { height: 4px; }
  .gallery-thumbs::-webkit-scrollbar-thumb { background: var(--panel-line); border-radius: 2px; }

  .thumb-btn {
    flex: 0 0 auto;
    width: 108px;
    aspect-ratio: 16 / 9;
    border: 1px solid var(--panel-line);
    border-radius: 3px;
    overflow: hidden;
    cursor: pointer;
    background: var(--panel);
    position: relative;
    padding: 0;
  }
  .thumb-btn img { width: 100%; height: 100%; object-fit: cover; display: block; opacity: .55; transition: opacity .2s; }
  .thumb-btn:hover img { opacity: .85; }
  .thumb-btn.active { border-color: var(--accent); }
  .thumb-btn.active img { opacity: 1; }
  .thumb-btn .play-icon {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; color: #fff;
    background: rgba(0,0,0,0.28);
  }

  /* ---------- Info panel: 类型 / 制作者 / 标签 ---------- */
  .info-panel {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 32px;
    padding: 32px 0;
    margin: 50px 0 56px;
    border-top: 1px solid var(--panel-line);
    border-bottom: 1px solid var(--panel-line);
  }
  .info-block .label {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 1.5px;
    color: var(--text-dim);
    text-transform: uppercase;
    margin-bottom: 10px;
  }
  .info-block .value { font-size: 14.5px; color: var(--text); }
  .info-block .tags { display: flex; flex-wrap: wrap; gap: 8px; }
  .info-block .tags span {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--data);
    border: 1px solid rgba(94,234,212,0.3);
    padding: 3px 8px;
    border-radius: 3px;
  }

  /* ---------- 技术目标（编号） ---------- */
  .tech-goals-heading {
    font-family: var(--mono);
    font-size: 13px;
    letter-spacing: 1.5px;
    color: var(--text-dim);
    text-transform: uppercase;
    border-bottom: 1px solid var(--panel-line);
    padding-bottom: 14px;
    margin-bottom: 8px;
  }
  .tech-goal {
    display: grid;
    grid-template-columns: 52px 1fr;
    gap: 20px;
    padding: 22px 0;
    border-bottom: 1px solid var(--panel-line);
  }
  .tech-goal .num {
    font-family: var(--mono);
    font-size: 20px;
    color: var(--accent);
  }
  .tech-goal h3 { font-size: 16px; margin-bottom: 8px; }
  .tech-goal p { color: var(--text-dim); font-size: 14px; white-space: pre-line; }

  #techGoals { margin-bottom: 52px; }

  section.block { margin-bottom: 52px; }
  section.block h2 {
    font-family: var(--mono);
    font-size: 13px;
    letter-spacing: 1.5px;
    color: var(--text-dim);
    text-transform: uppercase;
    border-bottom: 1px solid var(--panel-line);
    padding-bottom: 14px;
    margin-bottom: 20px;
  }
  section.block p { color: var(--text); white-space: pre-line; }

  .links-row {
    display: flex;
    gap: 28px;
    font-family: var(--mono);
    font-size: 13px;
    margin-top: 52px;
    padding-top: 32px;
    border-top: 1px solid var(--panel-line);
  }
  .links-row a { color: var(--text-dim); border-bottom: 1px solid transparent; }
  .links-row a:hover { color: var(--accent); border-color: var(--accent); }

  @media (max-width: 640px) {
    .info-panel { grid-template-columns: 1fr; gap: 24px; }
  }
</style>
</head>
<body>

<header>
  <a class="back-link" href="index.html" data-i18n="back">← 返回项目列表</a>
  <div class="lang-switch" role="group" aria-label="Language">
    <button data-lang="zh" class="active">中文</button>
    <button data-lang="en">EN</button>
    <button data-lang="ja">日本語</button>
  </div>
</header>

<main>
  <div class="build-tag">BUILD.05<small>Unity</small></div>
  <h1 data-i18n="title">冲 & 转</h1>
  <p class="lede" data-i18n="lede">冲刺、攀爬，不断消除同色方块，切勿让连击中断——顽强奋战到底！</p>

  <div class="stack">
    <span>C#</span><span>Unity</span><span>Aseprite</span>
  </div>

  <div class="gallery">
    <div class="gallery-main" id="galleryMain"></div>
    <div class="gallery-thumbs" id="galleryThumbs"></div>
  </div>

  <div class="info-panel">
    <div class="info-block">
      <div class="label" data-i18n="genreLabel">作品类型</div>
      <div class="value" data-i18n="genreValue">游戏类 · 策划向</div>
    </div>
    <div class="info-block">
      <div class="label" data-i18n="creatorLabel">制作者信息</div>
      <div class="value" data-i18n="creatorValue">个人开发</div>
    </div>
    <div class="info-block">
      <div class="label" data-i18n="tagsLabel">游戏标签</div>
      <div class="tags" id="tagsList"></div>
    </div>
  </div>

  <section class="block">
    <h2 data-i18n="h1">概述</h2>
    <p data-i18n="p1">挑战用24小时完成一个小游戏，只用一个操作就能支撑起一个玩法。</p>
  </section>

  <div class="tech-goals-heading" data-i18n="techGoalsHeading">技术目标</div>
  <div id="techGoals"></div>

  <section class="block">
    <h2 data-i18n="h4">成果</h2>
    <p data-i18n="p4">一款完成度较高的作品，并且在unityroom上制作了网页排行榜。\n在unityroom等公共平台上发布后已经有上百人体验过。</p>
  </section>

  <div class="links-row">
    <a href="https://mrmedius.itch.io/dash-spin" target="_blank" rel="noopener" data-i18n="itchLink">在 itch.io 试玩 →</a>
    <a href="https://unityroom.com/games/dashspin" target="_blank" rel="noopener" data-i18n="unityroomLink">在 unityroom 试玩 →</a>
  </div>
</main>

<script>
// ---------- 媒体素材：第一项是视频，之后是截图 ----------
// 把文件放进 asset 文件夹后，把下面的路径换成你自己的文件名即可
const mediaItems = [
  { type: 'video', src: 'asset/dash_v.mp4', poster: 'asset/dash_p_0.png' },
  { type: 'image', src: 'asset/dash_p_1.png' },
  { type: 'image', src: 'asset/dash_p_2.png' },
  { type: 'image', src: 'asset/dash_p_3.png' },
  { type: 'image', src: 'asset/dash_p_4.png' },
  { type: 'image', src: 'asset/dash_p_5.png' }
];

const translations = {
  zh: {
    pageTitle: "冲 & 转 · 项目详情",
    back: "← 返回项目列表",
    title: "冲 & 转",
    lede: "冲刺、攀爬，不断消除同色方块，切勿让连击中断——顽强奋战到底！",
    genreLabel: "作品类型",
    genreValue: "游戏类 · 策划向",
    creatorLabel: "制作者信息",
    creatorValue: "个人开发",
    tagsLabel: "游戏标签",
    tags: ["跳跃", "像素风", "2D"],
    h1: "概述",
    p1: "挑战用24小时完成一个小游戏，只用一个操作就能支撑起一个玩法。",
    techGoalsHeading: "技术目标",
    techGoals: [
      { title: "24小时开发挑战", desc: "围绕跳跃这一个机制设计一系列玩法。" },
      { title: "保持玩家的新鲜感", desc: "强迫玩家修改颜色，不让玩家的脑子习惯原来的颜色。" },
      { title: "爽感塑造", desc: "识别玩家身上的颜色，让玩家在位置正确的时候可以自然而然地达到连击。" },
      { title: "压力机制", desc: "只有通过连击来激发得分倍率和时间奖励。" }
    ],
    h4: "成果",
    p4: "一款完成度较高的作品，并且在unityroom上制作了网页排行榜。\n在unityroom等公共平台上发布后已经有上百人体验过。",
    itchLink: "在 itch.io 试玩 →",
    unityroomLink: "在 unityroom 试玩 →"
  },
  en: {
    pageTitle: "Dash & Spin · Project Detail",
    back: "← Back to projects",
    title: "Dash & Spin",
    lede: "Dash, climb, and keep matching the same colors without letting the chain break—fight tenaciously to the very end!",
    genreLabel: "Genre",
    genreValue: "Game Project · Design-Focused",
    creatorLabel: "Creator",
    creatorValue: "Solo Development",
    tagsLabel: "Tags",
    tags: ["Jump", "Pixel Art", "2D"],
    h1: "Overview",
    p1: "A challenge to create a mini-game in 24 hours, built around a single, core mechanic.",
    techGoalsHeading: "Technical Goals",
    techGoals: [
      { title: "24-Hour Dev Challenge", desc: "Designed a whole set of mechanics built entirely around a single action: jumping." },
      { title: "Keeping Things Fresh", desc: "Forces the player to keep changing colors, so their brain never settles into a fixed color pattern." },
      { title: "Crafting a Sense of Flow", desc: "Tracks the color currently carried by the player, so landing in the right spot naturally chains into a combo." },
      { title: "Pressure Mechanic", desc: "Score multipliers and time bonuses can only be triggered by keeping the combo alive." }
    ],
    h4: "Outcome",
    p4: "A fairly polished entry, complete with an online leaderboard built on unityroom.\nReleased on public platforms like unityroom, where it's already been played by over a hundred people.",
    itchLink: "Play on itch.io →",
    unityroomLink: "Play on unityroom →"
  },
  ja: {
    pageTitle: "ダッシュ＆スピン・プロジェクト詳細",
    back: "← プロジェクト一覧に戻る",
    title: "ダッシュ＆スピン",
    lede: "ダッシュや登り、同じ色を合わせて絶やさず、粘り強く戦い抜こう！",
    genreLabel: "作品の種類",
    genreValue: "ゲーム制作 · 企画重視",
    creatorLabel: "制作者情報",
    creatorValue: "個人開発",
    tagsLabel: "ゲームタグ",
    tags: ["ジャンプ", "ドット絵", "2D"],
    h1: "概要",
    p1: "単一のコアメカニクスを軸に、24時間でミニゲームを制作するチャレンジ。",
    techGoalsHeading: "技術目標",
    techGoals: [
      { title: "24時間開発チャレンジ", desc: "ジャンプという一つのアクションだけを軸に、一連の遊び方を設計しました。" },
      { title: "プレイヤーに新鮮さを保たせる", desc: "プレイヤーに色を変え続けることを強制し、脳が元の色に慣れてしまわないようにしています。" },
      { title: "爽快感の演出", desc: "プレイヤーが今どの色を持っているかを判定し、正しい位置に着地すれば自然とコンボにつながるようにしています。" },
      { title: "プレッシャー機構", desc: "スコア倍率やタイムボーナスは、コンボを維持し続けることでしか発動しません。" }
    ],
    h4: "成果",
    p4: "完成度の高い作品に仕上げ、unityroom上にはウェブ版のリーダーボードも用意しました。\nunityroomなどの公開プラットフォームで公開し、すでに100人以上にプレイされています。",
    itchLink: "itch.io でプレイ →",
    unityroomLink: "unityroom でプレイ →"
  }
};

let currentLang = localStorage.getItem('site-lang') || 'en';
let activeMediaIndex = 0;

function showMediaItem(index) {
  activeMediaIndex = index;
  const item = mediaItems[index];
  const main = document.getElementById('galleryMain');
  main.innerHTML = item.type === 'video'
    ? `<video controls poster="${item.poster}" src="${item.src}"></video>`
    : `<img src="${item.src}" alt="">`;
  document.querySelectorAll('.thumb-btn').forEach((btn, i) => btn.classList.toggle('active', i === index));
}

function renderGallery() {
  const thumbs = document.getElementById('galleryThumbs');
  thumbs.innerHTML = '';
  mediaItems.forEach((item, i) => {
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'thumb-btn' + (i === activeMediaIndex ? ' active' : '');
    const thumbSrc = item.type === 'video' ? item.poster : item.src;
    btn.innerHTML = `<img src="${thumbSrc}" alt="">` + (item.type === 'video' ? '<span class="play-icon">▶</span>' : '');
    btn.addEventListener('click', () => showMediaItem(i));
    thumbs.appendChild(btn);
  });
  showMediaItem(activeMediaIndex);
}

function renderTags(tags) {
  document.getElementById('tagsList').innerHTML = tags.map(tag => `<span>${tag}</span>`).join('');
}

function renderTechGoals(goals) {
  const wrap = document.getElementById('techGoals');
  wrap.innerHTML = goals.map((g, i) => `
    <div class="tech-goal">
      <div class="num">${String(i + 1).padStart(2, '0')}</div>
      <div>
        <h3>${g.title}</h3>
        <p>${g.desc}</p>
      </div>
    </div>
  `).join('');
}

function render() {
  const t = translations[currentLang];
  document.title = t.pageTitle;
  document.documentElement.lang = currentLang === 'zh' ? 'zh-CN' : currentLang;

  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.getAttribute('data-i18n');
    if (t[key]) el.textContent = t[key];
  });

  document.querySelectorAll('.lang-switch button').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.lang === currentLang);
  });

  renderTags(t.tags);
  renderTechGoals(t.techGoals);
}

document.querySelectorAll('.lang-switch button').forEach(btn => {
  btn.addEventListener('click', () => {
    currentLang = btn.dataset.lang;
    localStorage.setItem('site-lang', currentLang);
    render();
  });
});

renderGallery();
render();
</script>

</body>
</html>
