<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title data-i18n-title>Portfolio · Projects</title>
<style>
  :root {
    --bg: #0b0e14;
    --panel: #12161f;
    --panel-line: #1f2530;
    --text: #e4e7ec;
    --text-dim: #7c8494;
    --accent: #ff9d4d;
    --data: #5eead4;
    --mono: 'JetBrains Mono', 'Consolas', monospace;
    --sans: 'Inter', -apple-system, 'PingFang SC', 'Microsoft YaHei', 'Hiragino Sans', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    line-height: 1.6;
  }

  a { color: inherit; text-decoration: none; }
  ::selection { background: var(--accent); color: #0b0e14; }

  header {
    position: sticky;
    top: 0; z-index: 100;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 22px 5vw;
    background: rgba(11,14,20,0.9);
    backdrop-filter: blur(6px);
    border-bottom: 1px solid var(--panel-line);
  }

  .logo {
    font-family: var(--mono);
    font-size: 14px;
    letter-spacing: 1px;
    color: var(--text-dim);
  }
  .logo span { color: var(--accent); }

  .lang-switch { display: flex; gap: 4px; font-family: var(--mono); font-size: 12px; }
  .lang-switch button {
    background: transparent;
    border: 1px solid var(--panel-line);
    color: var(--text-dim);
    width: 68px;
    padding: 6px 0;
    border-radius: 3px;
    cursor: pointer;
    transition: all .2s;
    text-align: center;
  }
  .lang-switch button:hover { color: var(--text); border-color: var(--text-dim); }
  .lang-switch button.active { color: var(--accent); border-color: var(--accent); }
  .lang-switch button:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

  main { padding: 0 5vw 100px; max-width: 1240px; margin: 0 auto; }

  /* ---------- Intro ---------- */
  .intro {
    padding: 70px 0 60px;
    border-bottom: 1px solid var(--panel-line);
    margin-bottom: 60px;
  }
  .intro .eyebrow {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--accent);
    letter-spacing: 2px;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .intro .eyebrow::before { content: ''; width: 22px; height: 1px; background: var(--accent); }
  .intro h1 {
    font-family: var(--mono);
    font-size: clamp(30px, 5vw, 48px);
    letter-spacing: -0.5px;
    margin-bottom: 18px;
  }
  .intro .bio {
    color: var(--text-dim);
    font-size: 16px;
    max-width: 85ch;
    white-space: pre-line;
  }

  /* ---------- Section head ---------- */
  .section-head {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    border-bottom: 1px solid var(--panel-line);
    padding-bottom: 20px;
    margin-bottom: 44px;
  }
  .section-head h2 {
    font-family: var(--mono);
    font-size: 26px;
    font-weight: 600;
  }
  .section-head .tag { font-family: var(--mono); font-size: 12px; color: var(--text-dim); }

  /* ---------- Project cards ---------- */
  .projects { display: flex; flex-direction: column; gap: 2px; }

  .project {
    background: var(--panel);
    border: 1px solid var(--panel-line);
    border-radius: 4px;
    overflow: hidden;
    transition: border-color .25s;
  }
  .project:hover { border-color: var(--accent); }

  .project-head {
    display: grid;
    grid-template-columns: 110px 1fr 170px;
    gap: 24px;
    align-items: center;
    padding: 24px 28px;
  }

  .thumb {
    width: 100%;
    aspect-ratio: 1 / 1;
    border: 1px dashed var(--panel-line);
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-dim);
    text-align: center;
    padding: 6px;
    cursor: pointer;
    overflow: hidden;
  }
  .thumb.has-image { border-style: solid; padding: 0; }
  .thumb img { width: 100%; height: 100%; object-fit: contain; display: block; }

  .info { cursor: pointer; }
  .build-tag {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--accent);
    margin-bottom: 8px;
  }
  .build-tag small { color: var(--text-dim); margin-left: 8px; }

  .info h3 { font-size: 20px; margin-bottom: 8px; }
  .info p { color: var(--text-dim); font-size: 14px; max-width: 56ch; }

  .stack { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }
  .stack span {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--data);
    border: 1px solid rgba(94,234,212,0.3);
    padding: 3px 8px;
    border-radius: 3px;
  }

  .side {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 10px;
    font-family: var(--mono);
    font-size: 12px;
    text-align: right;
  }
  .side .detail-link { color: var(--accent); border-bottom: 1px solid transparent; }
  .side .detail-link:hover { border-color: var(--accent); }
  .side .disabled { color: #4a5160; }
  .side .toggle-btn {
    background: none;
    border: none;
    color: var(--text-dim);
    font-family: var(--mono);
    font-size: 11px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .side .toggle-btn:hover { color: var(--text); }
  .side .toggle-btn .expand-icon {
    display: inline-block;
    transition: transform .3s;
  }
  .project.open .side .toggle-btn .expand-icon { transform: rotate(180deg); }

  .project-body {
    max-height: 0;
    overflow: hidden;
    transition: max-height .35s ease;
  }

  .project-body-inner {
    padding: 0 28px 28px;
    border-top: 1px solid var(--panel-line);
  }
  .project-body-inner .overview {
    padding-top: 20px;
    color: var(--text-dim);
    font-size: 14.5px;
    max-width: 90ch;
    white-space: pre-line;
  }

  footer {
    padding: 26px 5vw;
    border-top: 1px solid var(--panel-line);
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-dim);
    text-align: center;
  }

  @media (max-width: 700px) {
    .project-head { grid-template-columns: 64px 1fr; grid-template-areas: "thumb info" "side side"; }
    .thumb { grid-area: thumb; }
    .info { grid-area: info; }
    .side { grid-area: side; flex-direction: row; justify-content: space-between; align-items: center; margin-top: 14px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">PORTFOLIO</div>
  <div class="lang-switch" role="group" aria-label="Language">
    <button data-lang="zh">中文</button>
    <button data-lang="en" class="active">EN</button>
    <button data-lang="ja">日本語</button>
  </div>
</header>

<main>
  <section class="intro">
    <div class="eyebrow" data-i18n="eyebrow">GAME DEV / SYSTEMS PROGRAMMING</div>
    <h1 data-i18n="name">Your Name</h1>
    <p class="bio" data-i18n="bio">Dedicated to creating entertaining games and convenient development tools.<br>
I enjoy the processes of development and design, and I have an aversion to disorganized systems.</p>
  </section>

  <div class="section-head">
    <h2 data-i18n="sectionTitle">Projects</h2>
    <div class="tag" data-i18n="sectionTag">3 BUILDS</div>
  </div>

  <div class="projects" id="projectList"></div>
</main>

<script>
const translations = {

      {

        overview: "在这里写更详细的项目概述：状态机设计方式、Boss 各阶段的行为切换逻辑、以及调试战斗手感时遇到的问题和解法。",
        stack: ["C#", "Unity", "状态机", "战斗系统"],
        hasDetail: false,
        detailHref: null
      },
      {
        tag: "BUILD.03", sub: "Unity 2D",
        title: "2D 横版平台游戏",
        desc: "Unity 2D 横版过关游戏，实现地面检测、地形生成与 UI 系统。",
        overview: "在这里写更详细的项目概述：地形生成算法的思路、地面检测的实现方式，以及 UI 系统的交互设计。",
        stack: ["C#", "Unity 2D", "地形生成", "UI"],

        detailHref: null
      }
    ]
  },
  en: {
    eyebrow: "GAME DEV / SYSTEMS PROGRAMMING",
    name: "Mr.Medius",
    bio: "Dedicated to creating entertaining games and convenient development tools.\nI enjoy the processes of development and design, and I have an aversion to disorganized systems.",
    sectionTitle: "Projects",
    sectionTag: "3 BUILDS",
    thumbAlt: "Thumbnail",
    toggleOpen: "Overview",
    toggleClose: "Close",
    detail: "Full Project Page →",
    comingSoon: "Detail page in progress",
    projects: [
      {
        tag: "BUILD.01", sub: "DirectX11",
        title: "Primary",
        desc: "Accumate energy through combos and expand it to execute further combo moves.",
        overview: "Utilize a custom code framework featuring a logic layer that integrates object pool with a Finite State Machine (FSM) system, alongside a presentation layer with a strictly defined rendering pipeline.\nEmploy global singletons to minimize performance overhead and streamline method calls.",

        hasDetail: true,

        thumbSrc: "asset/primary_p_1.png"
      },
      {
        tag: "BUILD.02", sub: "Unity",
        title: "MechGame · Boss Combat & Enemy Systems",
        desc: "A Unity C# combat system featuring a multi-phase boss behavior state machine, enemy AI, and skill-combo design.",
        overview: "Write a more detailed overview here: how the state machine was structured, the phase-transition logic for the boss, and issues you ran into while tuning combat feel.",

        hasDetail: false,

      },
      {
        tag: "BUILD.03", sub: "Unity 2D",
        title: "2D Side-Scrolling Platformer",
        desc: "A Unity 2D platformer implementing ground detection, terrain generation, and UI systems.",

      }
    ]

  ja: {
    eyebrow: "ゲーム開発 / システムプログラミング",

    sectionTitle: "プロジェクト",
    sectionTag: "3 BUILDS",

    toggleOpen: "概要",

    detail: "プロジェクト詳細ページ →",
    comingSoon: "詳細ページ準備中",
    projects: [
      {
        tag: "BUILD.01", sub: "DirectX11",
        title: "プライマリー",
        desc: "コンボでエネルギーを蓄積し、それでさらなるコンボ技を繰り出す。",
        overview: "オブジェクトプーリングと有限状態機械（FSM）システムを統合したロジック層と、厳密に定義されたレンダリングパイプラインを備えたプレゼンテーション層を特徴とするカスタムコードフレームワークを活用する。\nグローバルシングルトンを用いることで、パフォーマンスオーバーヘッドを最小限に抑え、メソッド呼び出しを効率化する。",
        stack: ["C++", "DirectX 11", "HLSL", "Aseprite"],
        hasDetail: true,
        detailHref: "build-01.html",
        thumbSrc: "asset/primary_p_1.png"
      },
      {
        tag: "BUILD.02", sub: "Unity",
        title: "MechGame・ボス戦闘と敵AIシステム",
        desc: "Unity C# で開発した戦闘システム。ボスの多段階ステートマシン、敵AI、スキルコンボ設計を含む。",
        overview: "ここに詳細な概要を書いてください：ステートマシンの設計方法、ボスの段階遷移ロジック、戦闘感覚を調整する際に直面した課題など。",
        stack: ["C#", "Unity", "ステートマシン", "戦闘システム"],
        hasDetail: false,
        detailHref: null
      },
      {
        tag: "BUILD.03", sub: "Unity 2D",
        title: "2D 横スクロールプラットフォーマー",
        desc: "地面検知、地形生成、UIシステムを実装した Unity 2D 横スクロールゲーム。",
        overview: "ここに詳細な概要を書いてください：地形生成のアルゴリズム、地面検知の実装方法、UIのインタラクション設計など。",
        stack: ["C#", "Unity 2D", "地形生成", "UI"],
        hasDetail: false,
        detailHref: null
      }
    ]
  }
};

const pageTitles = { zh: "作品集 · 项目", en: "Portfolio · Projects", ja: "ポートフォリオ・プロジェクト" };

let currentLang = localStorage.getItem('site-lang') || 'en';
let openSet = new Set(); // 记录当前展开的项目 index，跨语言切换保持

function buildCard(p, i, t) {
  const card = document.createElement('div');
  card.className = 'project' + (openSet.has(i) ? ' open' : '');

  const stackHtml = p.stack.map(s => `<span>${s}</span>`).join('');
  const sideLink = p.hasDetail
    ? `<a class="detail-link" href="${p.detailHref}">${t.detail}</a>`
    : `<span class="disabled">${t.comingSoon}</span>`;
  const thumbClass = 'thumb' + (p.thumbSrc ? ' has-image' : '');
  const thumbContent = p.thumbSrc
    ? `<img src="${p.thumbSrc}" alt="${p.title}">`
    : t.thumbAlt;

  card.innerHTML = `
    <div class="project-head">
      <div class="${thumbClass}" data-toggle>${thumbContent}</div>
      <div class="info" data-toggle>
        <div class="build-tag">${p.tag}<small>${p.sub}</small></div>
        <h3>${p.title}</h3>
        <p>${p.desc}</p>
        <div class="stack">${stackHtml}</div>
      </div>
      <div class="side">
        ${sideLink}
        <button class="toggle-btn" type="button" aria-expanded="${openSet.has(i)}">
          <span data-toggle-label>${openSet.has(i) ? t.toggleClose : t.toggleOpen}</span>
          <span class="expand-icon">▾</span>
        </button>
      </div>
    </div>
    <div class="project-body">
      <div class="project-body-inner">
        <div class="overview">${p.overview}</div>
      </div>
    </div>
  `;

  const body = card.querySelector('.project-body');
  const toggleBtn = card.querySelector('.toggle-btn');
  const toggleLabel = card.querySelector('[data-toggle-label]');

  function setOpen(open) {
    if (open) {
      openSet.add(i);
      card.classList.add('open');
      body.style.maxHeight = body.scrollHeight + 'px';
      toggleLabel.textContent = t.toggleClose;
      toggleBtn.setAttribute('aria-expanded', 'true');
    } else {
      openSet.delete(i);
      body.style.maxHeight = body.scrollHeight + 'px'; // 先定住当前高度
      requestAnimationFrame(() => { body.style.maxHeight = '0px'; });
      card.classList.remove('open');
      toggleLabel.textContent = t.toggleOpen;
      toggleBtn.setAttribute('aria-expanded', 'false');
    }
  }

  function toggle() { setOpen(!card.classList.contains('open')); }

  toggleBtn.addEventListener('click', toggle);
  card.querySelectorAll('[data-toggle]').forEach(el => el.addEventListener('click', toggle));

  // 语言切换后如果本来是展开状态，直接同步高度（无需动画）
  if (openSet.has(i)) {
    requestAnimationFrame(() => { body.style.maxHeight = body.scrollHeight + 'px'; });
  }

  return card;
}

function render() {
  const t = translations[currentLang];
  document.title = pageTitles[currentLang];
  document.documentElement.lang = currentLang === 'zh' ? 'zh-CN' : currentLang;

  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.getAttribute('data-i18n');
    if (t[key]) el.textContent = t[key];
  });

  document.querySelectorAll('.lang-switch button').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.lang === currentLang);
  });

  const list = document.getElementById('projectList');
  list.innerHTML = '';
  t.projects.forEach((p, i) => list.appendChild(buildCard(p, i, t)));
}

document.querySelectorAll('.lang-switch button').forEach(btn => {
  btn.addEventListener('click', () => {
    currentLang = btn.dataset.lang;
    localStorage.setItem('site-lang', currentLang);
    render();
  });
});

render();
</script>

</body>
</html>
